  PEAK_LEARNING_RATE: 0.0004
  generation:
    prompt: "「こんにちは、最近調子はどう？」と私は聞いた。"
    max_new_tokens: 150
    temperature: 0.7
    top_k: 40
    top_p: 0.8
    repetition_penalty: 1.15

diamond:
  VOCAB_SIZE: 28000
  MAX_LEN: 256
  EMBED_DIM: 864
