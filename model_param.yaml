default_model: gold

# coal :    23M
# iron :    42M
# gold :    96M
# diamond : 135M

coal:
  VOCAB_SIZE: 28000
  MAX_LEN: 256
  EMBED_DIM: 384
  NUM_TRANSFORMER_BLOCKS: 6
  NUM_HEADS: 6
  MODEL_SAVE_PATH: "data/model/coal.weights.h5"
  BATCH_SIZE: 32
  PEAK_LEARNING_RATE: 0.001
  generation:
    prompt: "iPhoneの上側には"
    max_new_tokens: 50
    temperature: 0.5
    top_k: 40
    top_p: 0.65
    repetition_penalty: 1.3
    # forbid_eos_until_step: 10

iron:
  VOCAB_SIZE: 28000
  MAX_LEN: 256
  EMBED_DIM: 512
  NUM_TRANSFORMER_BLOCKS: 8
  NUM_HEADS: 8
  MODEL_SAVE_PATH: "data/model/iron.weights.h5"
  BATCH_SIZE: 28
  PEAK_LEARNING_RATE: 0.0008
  generation:
    prompt: "今日はとても天気が良いので、"
    max_new_tokens: 100
    temperature: 0.6
    top_k: 30
    top_p: 0.8
    repetition_penalty: 1.2

gold:
  VOCAB_SIZE: 28000
  MAX_LEN: 256
  EMBED_DIM: 768
  NUM_TRANSFORMER_BLOCKS: 10
  NUM_HEADS: 12
  MODEL_SAVE_PATH: "data/model/gold.weights.h5"
